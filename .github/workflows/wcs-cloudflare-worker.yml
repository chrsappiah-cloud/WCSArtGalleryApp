name: WCS Cloudflare Worker

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: wcs-worker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Install and typecheck
        run: |
          npm ci
          npm run typecheck
